name: Build Android APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install deps
        working-directory: apps/web
        run: npm install --no-audit --no-fund

      - name: Build web (vite)
        working-directory: apps/web
        run: npm run build

      - name: Add Android platform
        working-directory: apps/web
        run: npx cap add android

      - name: Capacitor sync
        working-directory: apps/web
        run: npx cap sync android

      - name: Build debug APK
        working-directory: apps/web/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp apps/web/android/app/build/outputs/apk/debug/app-debug.apk moduplay-app-demo-v6.apk

      - name: Publish GitHub Release (public, no-login download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: demo-v6
          name: "데모 v6 — 인트로 + 랭킹·프로필·커뮤니티·슈퍼챗"
          body: "WEPLAY 모두의플레이 데모 v6. 인트로(로고 리빌) + P3 화면. 폰에선 PC/관리자 화면 숨김. 이전 버전 위에 덮어 설치 OK."
          files: moduplay-app-demo-v6.apk

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: everyplay-demo-apk
          path: moduplay-app-demo-v6.apk
          if-no-files-found: error
